# =========================================================
# CodeRabbit 설정 파일
# UMC WEB 파트 - 프론트엔드 과제 리뷰용
# 목적:
# 1) CodeRabbit이 1차 리뷰어 역할 수행
# 2) 파트장에게 어디를 보면 되는지 방향 제시
# 3) 팀원들이 리뷰를 통해 학습할 수 있게 유도
# =========================================================

# ---------------------------------------------------------
# 기본 언어 설정
# ---------------------------------------------------------
language: ko-KR

# ---------------------------------------------------------
# 전체 말투/리뷰 태도 설정
# tone_instructions는 최대 250자 제한이 있어서 짧게 유지
# 자세한 기준은 아래 path_instructions로 분산
# ---------------------------------------------------------
tone_instructions: >
  모든 리뷰와 요약은 한국어로 작성하세요
  차분, 친절, 협업형 말투를 사용하세요
  가독성을 위해 필요한 경우에만 적절한 이모티콘을 사용하세요
  버그 가능성, 예외 처리, 타입 안정성, 유지보수성을 우선 보고
  최신 React/TS 팁은 마지막에 짧게 제안하세요.
reviews:
  # -------------------------------------------------------
  # 리뷰 강도
  # -------------------------------------------------------
  profile: assertive

  # -------------------------------------------------------
  # 자동 승인 흐름 비활성화
  # -------------------------------------------------------
  request_changes_workflow: false

  # -------------------------------------------------------
  # PR 요약/상태 표시 설정
  # -------------------------------------------------------
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  changed_files_summary: true
  collapse_walkthrough: false
  review_status: true
  commit_status: true
  review_details: false
  sequence_diagrams: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  auto_apply_labels: false
  auto_assign_reviewers: false
  poem: false
  estimate_code_review_effort: true

  # -------------------------------------------------------
  # PR 전체 요약 방식 지정
  # -------------------------------------------------------
  high_level_summary_instructions: >
    요약은 한국어로 작성하세요.
    먼저 이 PR이 무엇을 변경하는지 2~4줄로 설명하고,
    그다음 리뷰에서 중요하게 볼 만한 위험 요소가 있으면 짧게 정리하세요.
    불필요하게 장황하게 쓰지 말고, 프론트엔드 협업자가 바로 이해할 수 있게 작성하세요.
    가능하면 마지막에 아래 항목도 짧게 덧붙이세요:
    1. 파트장이 우선 볼 파일
    2. 직접 확인할 핵심 코드 포인트
    3. 이번 PR에서 학습적으로 중요한 개념
    4. 추가로 알아두면 좋은 최신 팁(있다면 짧게)

  # -------------------------------------------------------
  # 파일 경로별 리뷰 기준
  # -------------------------------------------------------
  path_instructions:
    # =====================================================
    # components
    # =====================================================
    - path: "src/components/**/*.{ts,tsx,js,jsx}"
      instructions: >
        React 컴포넌트 리뷰 시 다음을 우선 확인하세요:
        1. 컴포넌트 역할이 과도하게 크지 않은지
        2. props가 과도하게 복잡하거나 의미가 불명확하지 않은지
        3. state가 불필요하게 많지 않은지
        4. 파생 가능한 값을 state로 중복 관리하지 않는지
        5. props 이름과 컴포넌트 이름이 역할을 잘 드러내는지
        6. 조건부 렌더링이 읽기 쉬운지
        7. key 누락, 불필요한 리렌더 유발 가능성, 핸들러 인라인 남발 여부
        8. 접근성 측면에서 버튼/링크/폼 요소 사용이 어색하지 않은지
        9. 재사용 가능한 UI인지, 페이지 전용 로직이 과하게 섞이지 않았는지

        코멘트에는 가능하면 아래를 함께 포함하세요:
        - 왜 문제인지
        - 어떤 버그/비효율이 생길 수 있는지
        - 어떤 방향으로 개선하면 좋은지
        - 파트장이 추가로 확인할 포인트 1줄

    # =====================================================
    # pages
    # =====================================================
    - path: "src/pages/**/*.{ts,tsx,js,jsx}"
      instructions: >
        페이지 파일 리뷰 시 다음을 우선 확인하세요:
        1. 페이지가 너무 많은 역할을 한 파일에 몰아넣지 않았는지
        2. 데이터 패칭, 상태 관리, UI 렌더링, 이벤트 처리의 책임 분리가 적절한지
        3. 로딩/에러/빈 상태 처리가 빠지지 않았는지
        4. 라우팅/파라미터 처리 오류 가능성이 없는지
        5. 중복 로직을 훅/유틸/컴포넌트로 분리할 여지가 큰지

        리뷰 마지막에는 파트장이 직접 확인해야 할 함수, useEffect, useMemo,
        useCallback 구간이 있다면 짧게 짚어주세요.

    # =====================================================
    # hooks
    # =====================================================
    - path: "src/hooks/**/*.{ts,tsx,js,jsx}"
      instructions: >
        hooks 파일 리뷰 시 다음을 우선 확인하세요:
        1. Hook 규칙 위반 여부
        2. 의존성 배열 정확성
        3. useMemo/useCallback을 형식적으로만 사용했는지
        4. stale closure 가능성
        5. 훅 이름과 반환값이 의도를 잘 드러내는지
        6. 커스텀 훅이 UI 세부사항에 과하게 결합되어 있지 않은지

        useEffect, useMemo, useCallback 관련 문제는 특히 교육적으로 설명하세요.
        왜 문제가 되는지, 왜 불필요한지, 또는 왜 필요한지를 중심으로 작성하세요.

    # =====================================================
    # apis
    # =====================================================
    - path: "src/apis/**/*.{ts,tsx,js,jsx}"
      instructions: >
        API/비동기 로직 리뷰 시 다음을 우선 확인하세요:
        1. 타입이 지나치게 느슨하지 않은지(any 남용, 단언 남용 등)
        2. null/undefined/빈 배열/에러 응답 처리 누락이 없는지
        3. 함수명이 역할을 잘 설명하는지
        4. 중복 로직이 없는지
        5. 상수화 가능한 하드코딩 값이 많은지
        6. 컴포넌트 내부에 직접 fetch/axios 로직이 과하게 흩어져 있지 않은지
        7. 에러 처리와 응답 형태 처리가 적절한지

    # =====================================================
    # layouts
    # =====================================================
    - path: "src/layouts/**/*.{ts,tsx,js,jsx}"
      instructions: >
        레이아웃 파일 리뷰 시 다음을 우선 확인하세요:
        1. 공통 레이아웃 책임이 과도하게 많아지지 않았는지
        2. 페이지 전용 로직이 레이아웃에 과하게 섞이지 않았는지
        3. 공통 UI 구조가 재사용 가능하게 설계되었는지
        4. 라우팅, 인증, 공통 래퍼 처리 시 예외 상황을 놓치지 않았는지
        5. 레이아웃 변경이 여러 페이지에 미치는 영향을 고려했는지

        리뷰 마지막에는 영향 범위가 큰 변경인지 짧게 짚어주세요.

    # =====================================================
    # utils / util
    # =====================================================
    - path: "src/{util,utils}/**/*.{ts,tsx,js,jsx}"
      instructions: >
        유틸 함수 리뷰 시 다음을 우선 확인하세요:
        1. 함수명이 역할을 명확히 설명하는지
        2. 여러 곳에서 재사용 가능한 형태인지
        3. null/undefined/빈값/예외 상황 처리 누락이 없는지
        4. 하드코딩된 값이나 숨겨진 전제조건이 없는지
        5. 특정 컴포넌트나 페이지에 과하게 종속된 유틸이 아닌지

        가능하면 입력값과 반환값의 안정성을 함께 검토하세요.

    # =====================================================
    # 공통 규칙
    # =====================================================
    - path: "src/**/*.{ts,tsx,js,jsx}"
      instructions: >
        공통적으로 아래 기준을 우선 리뷰하세요:
        - 실제 버그 가능성이 있는 문제
        - 요구사항과 다른 동작 가능성
        - 예외 처리 누락
        - API 응답 실패/빈값 상황에서의 안전성
        - 유지보수 시 혼란을 줄 수 있는 네이밍/구조 문제
        - 타입 안정성 문제

        최신 React/TypeScript 관행이나 공식 문서를 참고해도 좋지만,
        이런 내용은 필수 수정사항보다 우선하지 마세요.
        최신 정보, 현업 팁, 추가 개선 아이디어는 PR 후반부나 요약 마지막에
        "학습 포인트" 또는 "추가로 알아두면 좋은 점"처럼 부록 느낌으로 제안하세요.

        리뷰는 단순 지적에서 끝내지 말고,
        작성자가 다음 PR에서 더 나은 코드를 작성할 수 있도록 학습 포인트를 함께 제시하세요.
        취향 차이 수준의 코멘트는 꼭 필요한 경우에만 남기세요.

  # -------------------------------------------------------
  # 자동 리뷰 설정
  # -------------------------------------------------------
  auto_review:
    enabled: true
    auto_incremental_review: true

# ---------------------------------------------------------
# 채팅 기능
# ---------------------------------------------------------
chat:
  auto_reply: true

# ---------------------------------------------------------
# 지식 기반 설정
# ---------------------------------------------------------
knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: local